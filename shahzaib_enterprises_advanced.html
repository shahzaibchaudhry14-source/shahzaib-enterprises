<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shahzaib Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */
header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
header h1{
margin:0;
color:gold;
}
nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

/* HERO */
.hero{
background:url("https://images.unsplash.com/photo-1542291026-7eec264c27ff");
background-size:cover;
height:300px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:35px;
font-weight:bold;
text-shadow:2px 2px 5px black;
}

/* SEARCH */
.search{
text-align:center;
padding:20px;
}
.search input{
padding:10px;
width:60%;
border-radius:5px;
border:1px solid gray;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}
.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}
.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}
.product h3{
margin:10px 0;
}
.product button{
background:black;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
}
.product button:hover{
background:gold;
color:black;
}

/* CART */
.cart-icon{
position:fixed;
right:20px;
bottom:20px;
background:black;
color:white;
padding:15px;
border-radius:50%;
font-size:18px;
}

/* LOGIN / SIGNUP FORMS */
.form-section{
padding:30px;
text-align:center;
}
form{
background:white;
padding:20px;
border-radius:10px;
max-width:350px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
form input, form select{
width:100%;
padding:10px;
margin:5px 0;
}
form button{
background:black;
color:white;
padding:10px;
border:none;
width:100%;
cursor:pointer;
}
form button:hover{
background:gold;
color:black;
}

footer{
background:black;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

.admin-panel{
padding:20px;
background:#fff;
max-width:600px;
margin:20px auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.admin-panel input{
width:100%;
padding:10px;
margin:5px 0;
}
.admin-panel button{
padding:10px;
background:black;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
.admin-panel button:hover{
background:gold;
color:black;
}
</style>
</head>

<body>

<header>
<h1>Shahzaib Enterprises</h1>
<nav>
<a href="#">Home</a>
<a href="#shoes">Shoes</a>
<a href="#clothes">Clothes</a>
<a href="#login">Login</a>
<a href="#signup">Signup</a>
<a href="#admin">Admin</a>
</nav>
</header>

<div class="hero">
Latest Shoes & Fashion Clothes
</div>

<div class="search">
<input type="text" placeholder="Search products..." onkeyup="searchProducts(this.value)">
</div>

<div class="products" id="products">

<!-- Example Products -->
<div class="product" data-name="Running Shoes">
<img src="https://images.unsplash.com/photo-1528701800489-20be3c3d4a9b">
<h3>Running Shoes</h3>
<p>PKR 3500</p>
<button onclick="addCart('Running Shoes')">Add to Cart</button>
</div>

<div class="product" data-name="Casual Sneakers">
<img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb">
<h3>Casual Sneakers</h3>
<p>PKR 4200</p>
<button onclick="addCart('Casual Sneakers')">Add to Cart</button>
</div>

<div class="product" data-name="T-Shirt">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>T-Shirt</h3>
<p>PKR 1500</p>
<button onclick="addCart('T-Shirt')">Add to Cart</button>
</div>

<div class="product" data-name="Jeans">
<img src="https://images.unsplash.com/photo-1542272604-787c3835535d">
<h3>Jeans</h3>
<p>PKR 3200</p>
<button onclick="addCart('Jeans')">Add to Cart</button>
</div>

</div>

<div class="form-section" id="login">
<h2>Login</h2>
<form onsubmit="loginUser(event)">
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<button>Login</button>
</form>
</div>

<div class="form-section" id="signup">
<h2>Signup</h2>
<form onsubmit="signupUser(event)">
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<button>Create Account</button>
</form>
</div>

<div class="form-section" id="checkout">
<h2>Checkout</h2>
<form>
<input type="text" placeholder="Full Name" required>
<input type="text" placeholder="Phone Number" required>
<input type="text" placeholder="Address" required>
<select required>
<option value="">Select Payment Method</option>
<option>Cash on Delivery</option>
<option>EasyPaisa</option>
<option>JazzCash</option>
</select>
<button>Place Order</button>
</form>
</div>

<div class="admin-panel" id="admin">
<h2>Admin Panel</h2>
<input type="text" id="admin-product-name" placeholder="Product Name">
<input type="text" id="admin-product-price" placeholder="Price">
<input type="text" id="admin-product-img" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="cart-icon" id="cart">0</div>

<footer>
© 2026 Shahzaib Enterprises | Online Fashion Store
</footer>

<script>
let cart=0;

function addCart(product){
cart++;
document.getElementById("cart").innerText=cart;
alert(product + " added to cart!");
}

function signupUser(e){
e.preventDefault();
alert("Signup Successful");
}

function loginUser(e){
e.preventDefault();
alert("Login Successful");
}

function addProduct(){
let name=document.getElementById("admin-product-name").value;
let price=document.getElementById("admin-product-price").value;
let img=document.getElementById("admin-product-img").value;

if(name && price && img){
let container=document.getElementById("products");
let div=document.createElement("div");
div.className="product";
div.setAttribute("data-name",name);
div.innerHTML=`<img src="${img}"><h3>${name}</h3><p>PKR ${price}</p><button onclick="addCart('${name}')">Add to Cart</button>`;
container.appendChild(div);
document.getElementById("admin-product-name").value="";
document.getElementById("admin-product-price").value="";
document.getElementById("admin-product-img").value="";
alert("Product added!");
}else{
alert("Please fill all fields");
}
}

function searchProducts(query){
query=query.toLowerCase();
let products=document.querySelectorAll(".product");
products.forEach(p=>{
let name=p.getAttribute("data-name").toLowerCase();
if(name.includes(query)){
p.style.display="block";
}else{
p.style.display="none";
}
});
}

</script>

</body>
</html>
